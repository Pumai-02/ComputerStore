<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — TechNova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="admin-body">

<div id="adminLoginGate" class="admin-login-screen" style="display:none">
  <div class="admin-login-card">
    <i class="fa-solid fa-lock" style="font-size:2rem;color:var(--primary)"></i>
    <h2 style="margin:14px 0 6px">Admin Access Required</h2>
    <p id="adminGateMessage" style="color:var(--text-muted);font-size:0.9rem">You need to be logged in with an admin account to view this page.</p>
    <a href="../login.html?redirect=admin/index.html" class="admin-btn primary" style="margin-top:10px;justify-content:center">Log In</a>
    <p style="margin-top:14px"><a href="../index.html" style="font-size:0.85rem">← Back to store</a></p>
  </div>
</div>

<div class="admin-shell" id="adminShell" style="display:none">
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="index.html" class="admin-logo"><i class="fa-solid fa-bolt"></i> TechNova Admin</a>
    <nav class="admin-nav" id="adminNav">
      <a href="#dashboard" data-section="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="#products" data-section="products"><i class="fa-solid fa-box"></i> Products</a>
      <a href="#categories" data-section="categories"><i class="fa-solid fa-tags"></i> Categories</a>
      <a href="#orders" data-section="orders"><i class="fa-solid fa-receipt"></i> Orders</a>
      <a href="#messages" data-section="messages"><i class="fa-solid fa-envelope"></i> Messages</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
      <a id="adminLogoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 id="adminPageTitle">Dashboard</h1>
      <div class="admin-user-chip"><i class="fa-solid fa-circle-user"></i> <span id="adminUserName"></span></div>
    </div>
    <div id="adminContent"></div>
  </main>
</div>

<div class="admin-modal-backdrop" id="adminModal">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h3 id="adminModalTitle">Edit</h3>
      <button class="admin-modal-close" id="adminModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="adminModalBody"></div>
  </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/admin/js/admin.js"></script>
</body>
</html>
